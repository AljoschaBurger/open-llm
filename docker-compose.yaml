services:
  mysql:
    image: mysql:8.4
    environment:
      MYSQL_DATABASE: llm-db
      MYSQL_USER: user
      MYSQL_PASSWORD: user123
      MYSQL_ROOT_PASSWORD: root123
    ports:
      - "3306:3306"
    volumes:
        # creates the folder mysql-data in /var/lib/mysql inside of the container
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping","-h", "localhost", "-proot123"]
      interval: 5s
      timeout: 3s
      retries: 20
  llm:
    image: ollama/ollama:latest
    container_name: llm
    environment:
      - OLLAMA_MODEL=${OLLAMA_MODEL}
    ports:
      - "11435:11434"
    volumes:
      - llm-data:/root/.ollama
    entrypoint: /bin/sh
    command: -c "ollama serve & sleep 10 && echo '--- STARTING MODEL PULL (${OLLAMA_MODEL}) ---' && ollama pull ${OLLAMA_MODEL} && echo '--- MODEL READY ---' && wait"
    healthcheck:
      test: ["CMD-SHELL", "ollama list | grep -q '${OLLAMA_MODEL}'"]
      interval: 10s
      timeout: 5s
      retries: 60

  backend:
      build:
        context: ./backend
      environment:
      # USER : PASSWORD @ PROTOCOL(HOST:PORT) / DATABASE ? OPTIONS
        MYSQL_DSN: "user:user123@tcp(mysql:3306)/llm-db?parseTime=true"
        OLLAMA_BASE_URL: "http://llm:11434"
        OLLAMA_MODEL: "${OLLAMA_MODEL}"
      ports:
        - "8080:8080"
      depends_on:
        mysql:
          condition: service_healthy
        llm:
          condition: service_healthy
    
  frontend:
    build:
      context: ./frontend
    ports:
      - "3000:3000" 
    volumes:
      - ./frontend:/app        
      - /app/node_modules       
    environment:
      - CHOKIDAR_USEPOLLING=true 
    depends_on:
      - backend

volumes:
  mysql-data:
  llm-data:
  frontend:
